dialogues:
  player_greetings:
    - "Wisdom to you, Magi."
    - "Can you teach me something?"
  start_scenarios:
    - weight: 0.9
      text: "The flows of magic are chaotic here. I am measuring the ripples."
      next: "magic_talk"
    - weight: 0.1
