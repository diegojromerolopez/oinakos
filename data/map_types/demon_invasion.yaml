id: demon_invasion
name: Demon Invasion
type: survive # ObjSurvive
difficulty: 3
target_time: 120.0 # 2 minutes
description: "Survive the demonic onslaught! Use the muddy terrain and ruins to slow their advance."
width_px: 6000
height_px: 6000
floor_tile: "dry_ground.png"
player:
  x: -2.0
  y: -2.0

floor_zones:
  - name: "Ruined Town Square"
    tile: "dirt.png"
    priority: 5
    perimeter:
      - {x: -15, y: -15}
      - {x: 15, y: -15}
      - {x: 15, y: 15}
      - {x: -15, y: 15}
  - name: "Slowing Mud South"
    tile: "mud.png"
    priority: 4
    perimeter:
      - {x: -30, y: 15}
      - {x: 30, y: 15}
      - {x: 30, y: 40}
      - {x: -30, y: 40}
  - name: "Northern Dark Water"
    tile: "dark_water.png"
    priority: 3
    perimeter:
      - {x: -40, y: -40}
      - {x: 40, y: -40}
      - {x: 40, y: -15}
      - {x: -40, y: -15}

spawns:
