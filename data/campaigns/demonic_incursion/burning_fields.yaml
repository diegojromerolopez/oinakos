id: burning_fields
name: "Burning Fields"
type: survive
description: "Survive the demonic onslaught in the scorched fields. The Dark Waters trap the unwary."
difficulty: 3
target_time: 120
width_px: 6000
height_px: 6000
floor_tile: dry_ground.png
player:
  x: 5.0
  y: 5.0

floor_zones:
  - name: "Scorched Road"
    tile: "dirt.png"
    priority: 5
    perimeter:
      - {x: -20, y: -4}
      - {x: 20, y: -4}
      - {x: 20, y: 4}
      - {x: -20, y: 4}
  - name: "Northern Dark Water"
    tile: "dark_water.png"
    priority: 3
    perimeter:
      - {x: -30, y: -40}
      - {x: 30, y: -40}
      - {x: 30, y: -10}
      - {x: -30, y: -10}
  - name: "Southern Dark Water"
    tile: "dark_water.png"
    priority: 3
    perimeter:
      - {x: -30, y: 10}
      - {x: 30, y: 10}
      - {x: 30, y: 40}
      - {x: -30, y: 40}

spawns:
  # Highly aggressive demons rising from the waters
  - archetype: demon_male
    alignment: enemy
    probability: 0.25
    frequency: 1.0
    y: 20
  - archetype: demon_male
    alignment: enemy
    probability: 0.25
    frequency: 1.0
    y: -20
  
inhabitants:
  # Few remaining guards attempting to hold the line
  - npc: queens_guard
    x: -10
    y: 0
    alignment: ally
    behavior: patrol
  - npc: queens_guard
    x: 10
    y: 0
    alignment: ally
    behavior: patrol
  - archetype: peasant_male
    x: 0
    y: 2
    alignment: neutral
    behavior: flee

