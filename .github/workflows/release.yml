name: Release Oinakos

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-desktop:
    name: Build Desktop Binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: oinakos-linux
            asset_name: oinakos-linux-amd64
          - os: macos-latest
            artifact_name: oinakos-macos
            asset_name: oinakos-macos-amd64
          - os: windows-latest
            artifact_name: oinakos-windows
            asset_name: oinakos-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgl1-mesa-dev libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libxkbcommon-dev

      - name: Build
        run: |
          mkdir -p bin
          go build -o bin/${{ matrix.asset_name }} main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: bin/${{ matrix.asset_name }}

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build WASM
        run: |
          mkdir -p bin web-dist
          GOOS=js GOARCH=wasm go build -o bin/oinakos.wasm main.go
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" bin/
          cp bin/oinakos.wasm web-dist/
          cp assets/wasm/index.html web-dist/
          cp bin/wasm_exec.js web-dist/

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: oinakos-wasm
          path: web-dist/

  release:
    name: Create Release
    needs: [build-desktop, build-wasm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare Release Assets
        run: |
          mkdir assets
          cp oinakos-linux/oinakos-linux-amd64 assets/
          cp oinakos-macos/oinakos-macos-amd64 assets/
          cp oinakos-windows/oinakos-windows-amd64.exe assets/
          zip -r assets/oinakos-web.zip oinakos-wasm/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            assets/oinakos-linux-amd64
            assets/oinakos-macos-amd64
            assets/oinakos-windows-amd64.exe
            assets/oinakos-web.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-wasm
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: oinakos-wasm
          path: web-dist

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web-dist
          branch: gh-pages
